<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation | 誠摯邀請您</title>
    <style>
        /* 浪漫婚禮粉色系風格 */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; 
            background: #fff5f7; 
            color: #4a4a4a; 
            margin: 0; 
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* 喜帖主卡片 */
        .invitation-card {
            background: white;
            width: 85%;
            max-width: 450px;
            padding: 40px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(214, 51, 132, 0.08);
            text-align: center;
            border: 1px solid #fde2e4;
        }

        .heart-icon {
            color: #d63384;
            font-size: 35px;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 28px;
            color: #d63384;
            margin: 10px 0;
            font-family: "Georgia", serif;
        }

        .names {
            font-size: 22px;
            font-weight: bold;
            color: #495057;
            margin: 15px 0;
        }

        .details {
            font-size: 16px;
            line-height: 1.8;
            color: #6c757d;
            margin: 25px 0;
        }

        /* 呼叫彈窗的大按鈕 */
        .btn-show-popup {
            background: #d63384;
            color: white;
            border: none;
            padding: 14px 35px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(214, 51, 132, 0.3);
            transition: all 0.2s;
        }

        .btn-show-popup:hover {
            background: #b8236c;
            transform: translateY(-2px);
        }

        /* ========================================== */
        /* ✨ 核心修改：加大版 Pop-up 彈出視窗樣式 ✨ */
        /* ========================================== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6); /* 更加深背景，突出彈窗 */
            backdrop-filter: blur(5px);    /* 背景模糊特效，極具高級感 */
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        /* 當啟動時顯示彈窗 */
        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* 加大版的對話框本體 */
        .modal-box {
            background: white;
            width: 88%;              /* 適合手機屏幕，兩邊留少許奢華邊距 */
            max-width: 580px;        /* 💥 電腦版最大寬度顯著加大（原版通常只有350px） */
            padding: 45px 35px;      /* 💥 內邊距大幅加寬，讓排版大氣不擁擠 */
            border-radius: 24px;     /* 更圓潤優雅的圓角 */
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            text-align: center;
            box-sizing: border-box;
            border: 3px solid #fde2e4; /* 淡淡的粉紅邊框襯托 */
            transform: scale(0.8);
            transition: transform 0.3s ease;
        }

        .modal-overlay.active .modal-box {
            transform: scale(1);
        }

        /* 彈窗內的大標題 */
        .modal-box h3 {
            margin-top: 0;
            color: #d63384;
            font-size: 28px;         /* 💥 標題加大 */
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* 歡迎賓客的大字 */
        .guest-welcome {
            font-size: 24px;         /* 💥 賓客名字超大字體 */
            color: #212529;
            margin: 20px 0;
            font-weight: bold;
        }

        /* 報到序號的外框與超大數字 */
        .no-badge-container {
            background: #fff0f3;
            border: 2px dashed #d63384;
            border-radius: 16px;
            padding: 25px 20px;
            margin: 30px 0;
        }

        .no-label {
            font-size: 16px;
            color: #d63384;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .no-number {
            font-size: 56px;         /* 💥 報到編號超級放大！方便接待處一眼看清 */
            font-weight: 900;
            color: #b8236c;
            font-family: 'Courier New', Courier, monospace; /* 數字等寬更易讀 */
            letter-spacing: 2px;
        }

        .modal-hint {
            font-size: 16px;         /* 💥 提示文字加大 */
            color: #6c757d;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* 彈窗內的大按鈕 */
        .btn-close {
            background: #495057;
            color: white;
            border: none;
            padding: 16px 45px;      /* 💥 按鈕變大，方便手指點擊 */
            font-size: 18px;         /* 💥 按鈕字體加大 */
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;             /* 手機版直排大按鈕 */
            max-width: 250px;
        }

        .btn-close:hover {
            background: #212529;
        }
    </style>
</head>
<body>

    <!-- 喜帖主卡片內容 -->
    <div class="invitation-card">
        <div class="heart-icon">♥</div>
        <h1>Wedding Invitation</h1>
        <div class="names">Raymond & Karen</div>
        
        <div class="details">
            <p><strong>誠摯邀請您參與我們的婚禮</strong></p>
            <p>📅 日期：2027年1月16日</p>
            <p>📍 地點：婚宴御苑酒店宴會廳</p>
            <p style="margin-top: 15px; color: #aeaeae;">▼ 點擊下方按鈕獲取您的專屬報到編號 ▼</p>
        </div>

        <!-- 點擊彈出大框框 -->
        <button class="btn-show-popup" onclick="toggleModal(true)">📋 顯示我的專屬報到名牌</button>
    </div>


    <!-- ========================================== -->
    /* ✨ 大框大字 Pop-up 視窗 HTML 結構 ✨ */
    <!-- ========================================== -->
    <div id="weddingModal" class="modal-overlay">
        <div class="modal-box">
            <h3>✨ 婚禮專屬報到名牌 ✨</h3>
            
            <!-- 自動帶入賓客姓名 -->
            <div class="guest-welcome">
                親愛的 <span id="lblGuestName" style="color: #d63384;">賓客</span>：
            </div>
            
            <!-- 大號碼區域 -->
            <div class="no-badge-container">
                <div class="no-label">席位報到編號</div>
                <div id="lblGuestNo" class="no-number">---</div>
            </div>
            
            <p class="modal-hint">
                💡 <strong>溫馨提示：</strong><br>
                請於當天抵達婚宴接待處時，<br>
                <strong>出示此畫面</strong> 給工作人員，即可快速完成簽到引座喔！
            </p>
            
            <button class="btn-close" onclick="toggleModal(false)">確定並關閉</button>
        </div>
    </div>


    <script>
        // 自動解析網址內 URL 的參數 (?id=xxx&name=xxx&no=xxx)
        function getUrlParams() {
            const params = {};
            const search = window.location.search.substring(1);
            if (search) {
                const pairs = search.split("&");
                for (let i = 0; i < pairs.length; i++) {
                    const pair = pairs[i].split("=");
                    if (pair.length === 2) {
                        params[decodeURIComponent(pair[0])] = decodeURIComponent(pair[1]);
                    }
                }
            }
            return params;
        }

        // 網頁載入時自動執行
        window.onload = function() {
            const urlParams = getUrlParams();
            
            // 讀取名字（若網址無攜帶則顯示「貴賓」）
            const guestName = urlParams['name'] || '貴賓';
            // 讀取專屬編號（若網址無攜帶則顯示「000」）
            const guestNo = urlParams['no'] || urlParams['id'] || '000';
            
            // 寫入到 HTML 中
            document.getElementById('lblGuestName').innerText = guestName;
            document.getElementById('lblGuestNo').innerText = guestNo;
            
            // 為了方便賓客，一打開網頁時直接「自動彈出」這個大大的報到框！
            setTimeout(() => {
                toggleModal(true);
            }, 600);
        };

        // 控制彈窗打開與關閉的指令
        function toggleModal(show) {
            const modal = document.getElementById('weddingModal');
            if (show) {
                modal.classList.add('active');
            } else {
                modal.classList.remove('active');
            }
        }
    </script>

</body>
</html>
